name: DevSecOps CI Pipeline for Vulpy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  security_scans:
    name: Security Vulnerability Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies & security tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit bandit semgrep
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run SCA (pip-audit)
      run: |
        echo "=== Running pip-audit ==="
        pip-audit

    - name: Run SAST (Bandit)
      run: |
        echo "=== Running Bandit ==="
        bandit -r ./fix -v

    - name: Run SAST (Semgrep)
      run: |
        echo "=== Running Semgrep ==="
        semgrep --config p/owasp-top-10-2021